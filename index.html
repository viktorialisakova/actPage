<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рекламный баннер</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Форма для ввода данных -->
    <div class="input-section">
        <label for="background-word">Введите слово для фона:</label>
        <input type="text" id="background-word" placeholder="Например, «лето»">

        <br><br>

        <label for="image-url">Введите ссылку для вашего изображения:</label>
        <input type="url" id="image-url" placeholder="https://example.com/image.jpg">

        <button onclick="updateBackground()">Применить</button>
    </div>

    <!-- Баннер: фон (изображение/слово) + рекламный текст -->
    <div class="banner" id="banner">
        <div class="ad-text">
            Специальное предложение! 
            <br>Скидка 50%!
            <br><button class="cta-button" onclick="updateBackground()">Купить</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
